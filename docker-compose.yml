services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ticket-flow
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "ticket"
      MYSQL_USER: "ticket"
      MYSQL_PASSWORD: "ticket"
      TZ: "Asia/Seoul"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql-ticket-flow:/var/lib/mysql
    networks:
      - dev-ticket-flow

  redis:
    image: redis:7-alpine
    container_name: redis-ticket-flow
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-ticket-flow:/data
    networks:
      - dev-ticket-flow

volumes:
  mysql-ticket-flow:
  redis-ticket-flow:

networks:
  dev-ticket-flow:
    driver: bridge
